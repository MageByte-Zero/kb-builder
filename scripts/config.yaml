# kb-builder/scripts/config.yaml
# 编辑此文件声明你的内容源

content_sources:
  - path: ~/awesome-ai-kb
    name: magebyte-ai-kb
    enabled: true
  # - path: ~/your-own-content
  #   name: my-kb
  #   enabled: false

index:
  collection_name: unified_kb
  persist_dir: ./chroma_db
  embedding_model: sentence-transformers/mxbai-embed-large-v1
  # embedding_model: openai/text-embedding-3-small  # 备选，需设置 OPENAI_API_KEY
  device: cpu

chunking:
  article_max_size: 800
  brief_max_size: 600
  chunk_overlap: 80

mcp:
  default_top_k: 5
  max_top_k: 15
