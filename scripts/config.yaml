# KB Builder 配置文件
# 编辑此文件声明你的内容源

content_sources:
  - path: /Users/magebte/Documents/GitHub/awesome-ai-kb
    name: magebyte-ai-kb
    enabled: true

  - path: /Users/magebte/Documents/magebyte/kb-builder/private/articles
    name: magebyte-articles
    enabled: true

index:
  collection_name: unified_kb
  persist_dir: ./chroma_db
  embedding_model: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
  # embedding_model: openai/text-embedding-3-small  # 备选（v2.0 支持），需设置 OPENAI_API_KEY
  device: cpu

chunking:
  article_max_size: 800
  brief_max_size: 600
  # chunk_overlap: 80  # TODO: v2.0 滑动窗口重叠，暂未启用

mcp:
  default_top_k: 5
  max_top_k: 15
